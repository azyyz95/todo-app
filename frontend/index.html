<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZZ Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { inter: ['Inter', 'sans-serif'] },
            colors: {
              primary: '#7C3AED',
              secondary: '#4F46E5',
              accent: '#06B6D4',
            }
          }
        }
      }
    </script>
    <style>
      * { font-family: 'Inter', sans-serif; }
      .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
      .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(124,58,237,0.15); }
      .gradient-bg { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
      .btn-gradient { background: linear-gradient(135deg, #7C3AED, #4F46E5); }
      .progress-gradient { background: linear-gradient(90deg, #7C3AED, #06B6D4); }
      input:focus, textarea:focus { outline: none; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 10px; }
      .todo-done .todo-text { text-decoration: line-through; opacity: 0.5; }
      .detail-panel { display: none; }
      .detail-panel.open { display: block; }
      @keyframes slideIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
      .animate-slide { animation: slideIn 0.3s ease; }
    </style>
  </head>
  <body class="gradient-bg min-h-screen text-white">

    <div class="flex min-h-screen">

      <!-- SIDEBAR -->
      <aside class="w-64 glass fixed h-screen flex flex-col p-6 gap-8 z-10">

        <!-- Logo -->
        <div class="flex items-center gap-3 mt-2">
          <div class="w-10 h-10 btn-gradient rounded-xl flex items-center justify-center shadow-lg">
            <i class="fas fa-check-double text-white text-sm"></i>
          </div>
          <div>
            <h2 class="font-bold text-lg text-white">ZZ Todo</h2>
            <p class="text-xs text-purple-300">Task Manager</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="flex flex-col gap-3">
          <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Statistiques</p>
          <div class="glass rounded-2xl p-4 flex items-center gap-4 card-hover cursor-default">
            <div class="w-10 h-10 bg-purple-500/20 rounded-xl flex items-center justify-center">
              <i class="fas fa-list text-purple-400 text-sm"></i>
            </div>
            <div>
              <p class="text-2xl font-bold text-white" id="stat-total">0</p>
              <p class="text-xs text-gray-400">Total</p>
            </div>
          </div>
          <div class="glass rounded-2xl p-4 flex items-center gap-4 card-hover cursor-default">
            <div class="w-10 h-10 bg-cyan-500/20 rounded-xl flex items-center justify-center">
              <i class="fas fa-check text-cyan-400 text-sm"></i>
            </div>
            <div>
              <p class="text-2xl font-bold text-white" id="stat-done">0</p>
              <p class="text-xs text-gray-400">Terminées</p>
            </div>
          </div>
          <div class="glass rounded-2xl p-4 flex items-center gap-4 card-hover cursor-default">
            <div class="w-10 h-10 bg-orange-500/20 rounded-xl flex items-center justify-center">
              <i class="fas fa-clock text-orange-400 text-sm"></i>
            </div>
            <div>
              <p class="text-2xl font-bold text-white" id="stat-active">0</p>
              <p class="text-xs text-gray-400">En cours</p>
            </div>
          </div>
        </div>

        <!-- Progress -->
        <div class="glass rounded-2xl p-4">
          <div class="flex justify-between items-center mb-3">
            <p class="text-xs text-gray-400 font-semibold">Progression</p>
            <p class="text-sm font-bold text-purple-400" id="progress-percent">0%</p>
          </div>
          <div class="w-full bg-white/10 rounded-full h-2">
            <div class="progress-gradient h-2 rounded-full transition-all duration-700" id="progress-bar" style="width:0%"></div>
          </div>
        </div>

        <!-- User -->
        <div class="mt-auto glass rounded-2xl p-4 flex items-center gap-3">
          <div class="w-10 h-10 btn-gradient rounded-full flex items-center justify-center font-bold text-sm">AZ</div>
          <div>
            <p class="font-semibold text-sm text-white">Mohamed Aziz</p>
            <p class="text-xs text-green-400 flex items-center gap-1"><span class="w-1.5 h-1.5 bg-green-400 rounded-full inline-block"></span>En ligne</p>
          </div>
        </div>

      </aside>

      <!-- MAIN CONTENT -->
      <main class="ml-64 flex-1 p-8">

        <!-- Header -->
        <div class="mb-8">
          <h1 class="text-4xl font-extrabold text-white mb-1">Mes Tâches 📋</h1>
          <p class="text-gray-400 text-sm" id="today-date"></p>
        </div>

        <!-- Add Form -->
        <div class="glass rounded-2xl p-2 flex gap-2 mb-6 shadow-xl">
          <div class="flex-1 flex items-center gap-3 px-4">
            <i class="fas fa-plus text-purple-400 text-sm"></i>
            <input id="todo-input" type="text"
              placeholder="Ajouter une nouvelle tâche..."
              class="flex-1 bg-transparent text-white placeholder-gray-500 text-sm py-3 focus:outline-none"
            />
          </div>
          <button id="btn-add"
            class="btn-gradient text-white font-semibold text-sm px-6 py-3 rounded-xl shadow-lg hover:opacity-90 transition-all active:scale-95 flex items-center gap-2">
            <i class="fas fa-plus"></i> Ajouter
          </button>
        </div>

        <!-- Filters -->
        <div class="flex gap-2 mb-6" id="filters">
          <button class="filter-btn active px-5 py-2 rounded-xl text-sm font-semibold transition-all btn-gradient text-white shadow" data-filter="all">Toutes</button>
          <button class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold transition-all glass text-gray-300 hover:text-white" data-filter="active">En cours</button>
          <button class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold transition-all glass text-gray-300 hover:text-white" data-filter="done">Terminées</button>
        </div>

        <!-- Todos List -->
        <div id="todos-list"></div>

      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
